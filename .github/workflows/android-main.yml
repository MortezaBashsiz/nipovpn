name: Build Android Binary - main

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'core/src/**'
      - 'core/**'
      - 'CMakeLists.txt'
      - 'core/CMakeLists.txt'
      - '.github/workflows/android-main.yml'

permissions:
  contents: write

env:
  PACKAGE_VERSION: 1.1.57

jobs:
  build-android:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Install host dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            git \
            curl \
            zip \
            unzip \
            tar \
            pkg-config \
            autoconf \
            autoconf-archive \
            automake \
            libtool

      - name: Setup Android NDK r29
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r29
          add-to-path: true

      - name: Show Android NDK information
        run: |
          echo "ANDROID_NDK_HOME=$ANDROID_NDK_HOME"
          echo "ANDROID_NDK_ROOT=$ANDROID_NDK_ROOT"
          ls -lah "$ANDROID_NDK_HOME"

      - name: Setup vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg.git "$HOME/vcpkg"
          "$HOME/vcpkg/bootstrap-vcpkg.sh"

          echo "VCPKG_ROOT=$HOME/vcpkg" >> "$GITHUB_ENV"
          echo "$HOME/vcpkg" >> "$GITHUB_PATH"

      - name: Build Android dependencies
        run: |
          "$VCPKG_ROOT/vcpkg" install \
            boost:arm64-android \
            openssl:arm64-android \
            yaml-cpp:arm64-android

      - name: Configure Android arm64-v8a build
        run: |
          rm -rf build-android-arm64

          cmake -S . -B build-android-arm64 \
            -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE="$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" \
            -DVCPKG_TARGET_TRIPLET=arm64-android \
            -DVCPKG_CHAINLOAD_TOOLCHAIN_FILE="$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake" \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-23 \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_EXE_LINKER_FLAGS="-Wl,-z,max-page-size=16384" \
            -DCMAKE_SHARED_LINKER_FLAGS="-Wl,-z,max-page-size=16384"

      - name: Build Android arm64-v8a binary
        run: |
          cmake --build build-android-arm64 -j"$(nproc)"

      - name: Collect Android binary and libraries
        run: |
          mkdir -p out/android/arm64-v8a

          if [ ! -f build-android-arm64/core/nipovpn ]; then
            echo "Android binary not found:"
            find build-android-arm64 -type f || true
            exit 1
          fi

          cp build-android-arm64/core/nipovpn out/android/arm64-v8a/libnipovpn_"${{ env.PACKAGE_VERSION }}".so
          chmod 755 out/android/arm64-v8a/libnipovpn_"${{ env.PACKAGE_VERSION }}".so

          find "$VCPKG_ROOT/installed/arm64-android" -type f -name "*.so*" -exec cp -v {} out/android/arm64-v8a/ \; || true

          ls -lah out/android/arm64-v8a/

      - name: Check 16 KB ELF alignment
        run: |
          READELF="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-readelf"

          for file in out/android/arm64-v8a/*.so*; do
            echo "Checking $file"
            "$READELF" -l "$file" | grep -A3 LOAD || true

            if "$READELF" -l "$file" | awk '/LOAD/ && $NF != "0x4000" { bad=1 } END { exit bad }'; then
              echo "OK: $file is 16 KB aligned"
            else
              echo "ERROR: $file is not 16 KB aligned"
              exit 1
            fi
          done

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: nipovpn-main-android-arm64-v8a
          path: out/android/arm64-v8a/

  release-android:
    needs:
      - build-android
    runs-on: ubuntu-24.04

    steps:
      - name: Download Android artifact
        uses: actions/download-artifact@v4
        with:
          name: nipovpn-main-android-arm64-v8a
          path: ./android-artifact

      - name: Show downloaded Android artifact
        run: |
          ls -lah android-artifact

      - name: Create Android GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-v${{ env.PACKAGE_VERSION }}
          name: Android Binary v${{ env.PACKAGE_VERSION }}
          prerelease: true
          files: |
            android-artifact/*
        env:
          GITHUB_TOKEN: ${{ github.token }}
