name: Build and Release Debian Package - MORI

on:
  push:
    branches:
      - mori
    paths:
      - 'core/src/**'
      - 'core/**'
      - 'nipovpn/**'
      - '.github/workflows/debian-mori.yml'

permissions:
  contents: write

env:
  PACKAGE_VERSION: 0.2.${{ github.run_number }}

jobs:
  build:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
          - arch: arm64
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            dpkg-dev \
            build-essential \
            lintian \
            fakeroot \
            devscripts \
            cmake \
            libssl-dev \
            libboost-all-dev \
            libyaml-cpp-dev

      - name: Build binary
        run: |
          rm -rf build

          if [ "${{ matrix.arch }}" = "arm64" ]; then
            docker run --rm --platform linux/arm64 \
              -v "$PWD:/src" \
              -w /src \
              ubuntu:24.04 \
              bash -c '
                apt-get update
                apt-get install -y \
                  build-essential \
                  cmake \
                  libssl-dev \
                  libboost-all-dev \
                  libyaml-cpp-dev

                mkdir -p build
                cd build
                cmake -DCMAKE_BUILD_TYPE=Release ..
                make -j$(nproc)
              '
          else
            mkdir -p build
            cd build
            cmake -DCMAKE_BUILD_TYPE=Release ..
            make -j$(nproc)
          fi

      - name: Build Debian package
        run: |
          PACKAGE_FILE="nipovpn_mori_${PACKAGE_VERSION}_${{ matrix.arch }}.deb"

          mkdir -p nipovpn/usr/bin

          cp build/core/nipovpn nipovpn/usr/bin/nipovpn
          chmod 755 nipovpn/usr/bin/nipovpn

          sed -i -E "s/^Version[[:space:]]*:.*/Version: ${PACKAGE_VERSION}/" nipovpn/DEBIAN/control
          sed -i -E "s/^Architecture[[:space:]]*:.*/Architecture: ${{ matrix.arch }}/" nipovpn/DEBIAN/control

          echo "Final control file:"
          cat nipovpn/DEBIAN/control

          grep "^Version: ${PACKAGE_VERSION}$" nipovpn/DEBIAN/control
          grep "^Architecture: ${{ matrix.arch }}$" nipovpn/DEBIAN/control

          dpkg-deb --build nipovpn "build/${PACKAGE_FILE}"

      - name: Show package information
        run: |
          PACKAGE_FILE="nipovpn_mori_${PACKAGE_VERSION}_${{ matrix.arch }}.deb"
          dpkg -I "build/${PACKAGE_FILE}"
          dpkg -c "build/${PACKAGE_FILE}"

      - name: Upload Debian package as artifact
        uses: actions/upload-artifact@v4
        with:
          name: nipovpn-mori-deb-${{ matrix.arch }}
          path: build/nipovpn_mori_${{ env.PACKAGE_VERSION }}_${{ matrix.arch }}.deb

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download Debian package artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: nipovpn-mori-deb-*
          merge-multiple: true
          path: ./

      - name: Create MORI GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: mori-v${{ env.PACKAGE_VERSION }}
          name: MORI Version v${{ env.PACKAGE_VERSION }}
          prerelease: true
          files: |
            nipovpn_mori_${{ env.PACKAGE_VERSION }}_amd64.deb
            nipovpn_mori_${{ env.PACKAGE_VERSION }}_arm64.deb
        env:
          GITHUB_TOKEN: ${{ github.token }}