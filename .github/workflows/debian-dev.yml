name: Build and Release Debian Package - DEV

on:
  push:
    branches:
      - dev
    paths:
      - 'core/src/**'
      - 'core/**'
      - 'nipovpn/**'
      - '.github/workflows/debian-dev.yml'

permissions:
  contents: write

env:
  PACKAGE_VERSION: 0.1.${{ github.run_number }}
  PACKAGE_FILE: nipovpn_dev_0.1.${{ github.run_number }}_amd64.deb

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            dpkg-dev \
            build-essential \
            lintian \
            fakeroot \
            devscripts \
            cmake \
            libssl-dev \
            libboost-all-dev \
            libyaml-cpp-dev

      - name: Build binary
        run: |
          rm -rf build
          mkdir -p build
          cd build
          cmake -DCMAKE_BUILD_TYPE=Release ..
          make -j$(nproc)

      - name: Build Debian package
        run: |
          mkdir -p nipovpn/usr/bin

          cp build/core/nipovpn nipovpn/usr/bin/nipovpn
          chmod 755 nipovpn/usr/bin/nipovpn

          sed -i "s/^Version:.*/Version: ${PACKAGE_VERSION}/" nipovpn/DEBIAN/control

          dpkg-deb --build nipovpn "build/${PACKAGE_FILE}"

      - name: Show package information
        run: |
          dpkg -I "build/${PACKAGE_FILE}"
          dpkg -c "build/${PACKAGE_FILE}"

      - name: Upload Debian package as artifact
        uses: actions/upload-artifact@v4
        with:
          name: nipovpn-dev-deb
          path: build/${{ env.PACKAGE_FILE }}

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download Debian package artifact
        uses: actions/download-artifact@v4
        with:
          name: nipovpn-dev-deb
          path: ./

      - name: Create DEV GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: dev-v${{ env.PACKAGE_VERSION }}
          name: DEV Version v${{ env.PACKAGE_VERSION }}
          prerelease: true
          files: ${{ env.PACKAGE_FILE }}
        env:
          GITHUB_TOKEN: ${{ github.token }}